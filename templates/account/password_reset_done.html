{% extends "account/_auth_base.html" %}

{% block title %}Check your email{% endblock %}

{% block card_content %}
  <div class="text-center py-4">
    <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-900">Check your email</h2>
    <p class="mt-3 text-sm text-gray-500 max-w-xs mx-auto">
      We've sent a password reset link. It expires in 24 hours.
      Check your spam folder if it doesn't arrive.
    </p>
    <a href="{% url 'account_login' %}"
       class="mt-6 inline-block text-sm font-medium text-brand-600 hover:text-brand-700">
      Back to sign in &rarr;
    </a>
  </div>
{% endblock %}
