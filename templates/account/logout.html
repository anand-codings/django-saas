{% extends "account/_auth_base.html" %}

{% block title %}Sign out{% endblock %}

{% block card_content %}
  <div class="text-center">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Sign out?</h2>
    <p class="text-sm text-gray-500 mb-6">You'll need to sign back in to access your account.</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit"
              class="w-full flex justify-center py-2.5 px-4 rounded-lg shadow-sm text-sm font-semibold
                     text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2
                     focus:ring-offset-2 focus:ring-red-600 transition-colors">
        Yes, sign me out
      </button>
    </form>
    <a href="/" class="mt-3 inline-block text-sm text-gray-500 hover:text-gray-700">
      Cancel — take me home
    </a>
  </div>
{% endblock %}
