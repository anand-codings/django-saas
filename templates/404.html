{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}
{% block meta_description %}The page you're looking for doesn't exist.{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <p class="text-8xl font-black text-gray-200 select-none">404</p>
  <h1 class="mt-4 text-3xl font-bold text-gray-900">Page not found</h1>
  <p class="mt-3 text-gray-500 max-w-sm">
    The page you're looking for doesn't exist or may have been moved.
  </p>
  <div class="mt-8 flex flex-wrap gap-3 justify-center">
    <a href="/"
       class="bg-brand-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-brand-700 transition-colors">
      Go home
    </a>
    <button onclick="history.back()"
            class="border border-gray-300 text-gray-700 px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
      Go back
    </button>
  </div>
</div>
{% endblock %}
